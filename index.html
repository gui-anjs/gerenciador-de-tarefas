<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Gerenciador de Tarefas</title>

    <link rel="stylesheet" href="css/style.css">

</head>

<body>

    <header>

        <h1>Gerenciador de Tarefas</h1>

    </header>

    <main>

        <!-- FORMULÁRIO -->

        <section class="formulario">

            <h2>Nova Tarefa</h2>

            <input
                type="text"
                id="titulo"
                placeholder="Título da tarefa">

            <input
                type="text"
                id="responsavel"
                placeholder="Responsável">

            <textarea
                id="descricao"
                placeholder="Descrição da tarefa"></textarea>

            <select id="prioridade">

                <option value="">Selecione a prioridade</option>

                <option value="Baixa">Baixa</option>

                <option value="Média">Média</option>

                <option value="Alta">Alta</option>

            </select>

            <input
                type="date"
                id="data">

            <button id="btnAdicionar">

                Adicionar Tarefa

            </button>

        </section>

        <!-- CONTADORES -->

        <section class="contadores">

            <div class="contador verde">

                <h3>Baixa</h3>

                <span id="totalBaixa">0</span>

            </div>

            <div class="contador amarelo">

                <h3>Média</h3>

                <span id="totalMedia">0</span>

            </div>

            <div class="contador vermelho">

                <h3>Alta</h3>

                <span id="totalAlta">0</span>

            </div>

        </section>

        <!-- QUADRO -->

        <section class="kanban">

            <div class="coluna">

                <h2>ABERTO</h2>

                <div id="aberto"></div>

            </div>

            <div class="coluna">

                <h2>EM ANDAMENTO</h2>

                <div id="andamento"></div>

            </div>

            <div class="coluna">

                <h2>FINALIZADO</h2>

                <div id="finalizado"></div>

            </div>

        </section>

    </main>

    <script src="js/script.js"></script>

</body>

</html>
